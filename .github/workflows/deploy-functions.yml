name: Deploy Edge Functions

on:
  push:
    paths:
      - 'supabase/functions/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy match-subscriptions --project-ref xgcldcnqfqcugkcifyae
          supabase functions deploy process-push-queue --project-ref xgcldcnqfqcugkcifyae
          supabase functions deploy register-push-token --project-ref xgcldcnqfqcugkcifyae
          supabase functions deploy save-alert-subscription --project-ref xgcldcnqfqcugkcifyae
