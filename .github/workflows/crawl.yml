name: Crawl Sodate Events

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 오전 08:00 KST (UTC 23:00 전날)
    - cron: '0 11 * * *'   # 매일 오후 20:00 KST (UTC 11:00)
  workflow_dispatch:         # 수동 실행

jobs:
  crawl:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('crawler/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('crawler/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          cd crawler
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MODPARTY_ID: ${{ secrets.MODPARTY_ID }}
          MODPARTY_PW: ${{ secrets.MODPARTY_PW }}
        run: |
          cd crawler
          python main.py

      - name: Run review crawlers (once a day, 23:00 UTC run only)
        if: github.event_name == 'workflow_dispatch' || contains(github.event.schedule, '0 23')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd crawler
          python reviews_main.py

      - name: QA — 크롤링 결과 검증
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd crawler
          python qa_validator.py
        continue-on-error: true   # WARN만 있을 때 전체 워크플로우 중단 방지

      - name: Process push queue (send notifications)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # process-push-queue 3회 호출 (큐 완전 소진)
          for i in 1 2 3; do
            curl -sf -X POST \
              "$SUPABASE_URL/functions/v1/process-push-queue" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" || true
            sleep 2
          done

      - name: Check deadline reminders
        if: github.event_name == 'workflow_dispatch' || contains(github.event.schedule, '0 11')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 -c "
          import os, httpx, json
          from datetime import datetime, timedelta, timezone

          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_ROLE_KEY']
          headers = {'apikey': key, 'Authorization': f'Bearer {key}', 'Content-Type': 'application/json'}

          # D-1 이벤트 조회 (KST 기준 내일)
          KST = timezone(timedelta(hours=9))
          tomorrow_kst = (datetime.now(KST) + timedelta(days=1)).strftime('%Y-%m-%d')
          resp = httpx.get(
              f'{url}/rest/v1/events',
              params=[
                  ('select', 'id,title,event_date,location_region,company_id,source_url'),
                  ('event_date', f'gte.{tomorrow_kst}T00:00:00+09:00'),
                  ('event_date', f'lt.{tomorrow_kst}T23:59:59+09:00'),
                  ('is_active', 'eq.true'),
                  ('is_closed', 'eq.false'),
              ],
              headers=headers, timeout=15
          )
          events = resp.json() if resp.status_code == 200 else []
          print(f'D-1 이벤트: {len(events)}개')

          for event in events:
              edge_resp = httpx.post(
                  f'{url}/functions/v1/match-subscriptions',
                  json={'record': {**event, '_notification_type': 'deadline_reminder'}},
                  headers={'Authorization': f'Bearer {key}', 'Content-Type': 'application/json'},
                  timeout=15
              )
              print(f'마감 알림 큐: {edge_resp.status_code}')
          "

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::크롤링 실패 — Supabase crawl_logs 및 GitHub Actions 로그를 확인하세요."
